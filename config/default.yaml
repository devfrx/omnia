# ──────────────────────────────────────────────────
# O.M.N.I.A. — Default Configuration
# ──────────────────────────────────────────────────

server:
  host: "0.0.0.0"
  port: 8000
  reload: true          # dev only
  cors_origins:
    - "http://localhost:5173"   # Vite dev
    - "http://localhost:3000"   # Electron dev
    - "null"                    # Electron production (file:// origin)

llm:
  provider: "openai-compatible"    # Works with LM Studio, Ollama, or any OpenAI-compatible API
  base_url: "http://localhost:1234"  # Ollama default (:11434) — change to :1234 for LM Studio
  model: "mistralai/ministral-3-14b-reasoning"                 # Ollama model tag (use ollama list to verify)
  temperature: 0.7
  max_tokens: 30311
  system_prompt_file: "config/system_prompt.md"
  supports_thinking: true    # Enable for reasoning models (QwQ, DeepSeek R1)
  supports_vision: true       # qwen3.5:9b supports vision natively
  max_tool_iterations: 10
  confirmation_timeout_s: 60
  # Ollama-specific options (ignored by LM Studio / other providers)
  num_ctx: 8192          # Context window — Ollama defaults to 2048, too small for tool calling
  num_gpu: -1            # -1 = offload all layers to GPU (use full VRAM)
  keep_alive: "5m"       # Keep model loaded in VRAM between requests

stt:
  engine: "faster-whisper"
  model: "large-v3"
  language: "it"
  device: "cuda"            # cuda | cpu
  compute_type: "float16"   # float16 | int8 | int8_float16
  vad_filter: true
  vad_threshold: 0.5

tts:
  engine: "piper"
  voice: "it_IT-riccardo-x_low"
  sample_rate: 22050
  # Alternative XTTS config (opzionale):
  # engine: "xtts"
  # model: "tts_models/multilingual/multi-dataset/xtts_v2"
  # speaker_wav: "config/voice_reference.wav"
  # language: "it"

database:
  url: "sqlite+aiosqlite:///data/omnia.db"

plugins:
  enabled:
    - system_info
    - pc_automation
    - web_search
    - calendar
    # - home_automation   # Abilitare quando Home Assistant è configurato

home_assistant:
  url: "http://homeassistant.local:8123"
  token: ""   # Long-Lived Access Token

mqtt:
  broker: "localhost"
  port: 1883
  username: ""
  password: ""

voice:
  wake_word: "omnia"
  activation_mode: "push_to_talk"  # push_to_talk | wake_word | always_on
  silence_timeout_ms: 1500

ui:
  theme: "dark"
  global_hotkey: "Ctrl+Shift+O"
  language: "it"
