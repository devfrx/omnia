# ──────────────────────────────────────────────────
# O.M.N.I.A. — Default Configuration
# ──────────────────────────────────────────────────

server:
  host: "127.0.0.1"
  port: 8000
  reload: true          # dev only
  cors_origins:
    - "http://localhost:5173"   # Vite dev
    - "http://localhost:3000"   # Electron dev
    - "null"                    # Electron production (file:// origin)

llm:
  provider: "lmstudio"             # Primary: LM Studio v1 REST API. Also compatible with Ollama
  base_url: "http://localhost:1234"  # LM Studio default (:1234) — change to :11434 for Ollama
  api_token: ""                      # LM Studio API token (optional, leave empty if auth disabled)
  model: "mistralai/ministral-3-14b-reasoning"
  temperature: 0.7
  max_tokens: 30311
  system_prompt_file: "config/system_prompt.md"
  supports_thinking: true    # Enable for reasoning models (QwQ, DeepSeek R1)
  supports_vision: true       # Enable for multimodal models
  max_tool_iterations: 25
  # Ollama-specific options (ignored by LM Studio)
  num_ctx: 8192
  num_gpu: -1
  keep_alive: "5m"

stt:
  engine: "faster-whisper"
  model: "large-v3"
  language: "it"
  device: "cuda"            # cuda | cpu
  compute_type: "float16"   # float16 | int8 | int8_float16
  vad_filter: true
  vad_threshold: 0.5
  enabled: true
  max_audio_duration_s: 300
  max_audio_size_mb: 50

tts:
  engine: "piper"
  voice: "models/tts/it_IT-paola-medium"
  sample_rate: 22050
  enabled: true
  speed: 1.0
  xtts_model: "tts_models/multilingual/multi-dataset/xtts_v2"
  xtts_speaker_wav: ""
  xtts_language: "it"
  kokoro_model: "models/tts/kokoro-v1.0.onnx"
  kokoro_voices: "models/tts/voices-v1.0.bin"
  kokoro_voice: "if_sara"
  kokoro_language: "it"

database:
  url: "sqlite+aiosqlite:///data/omnia.db"

plugins:
  enabled:
    - system_info
    - pc_automation
    - web_search
    - calendar
    - weather
    - clipboard
    - notifications
    - media_control
    - file_search
    - news
    # - home_automation  # not implemented yet

home_assistant:
  url: "http://homeassistant.local:8123"
  token: ""   # Long-Lived Access Token

mqtt:
  broker: "localhost"
  port: 1883
  username: ""
  password: ""

voice:
  wake_word: "omnia"
  activation_mode: "push_to_talk"  # push_to_talk | wake_word | always_on
  silence_timeout_ms: 1500
  auto_tts_response: true
  voice_confirmation_enabled: true

pc_automation:
  enabled: false
  screenshot_lockout_s: 60
  command_timeout_s: 30
  max_command_output_chars: 500
  confirmations_enabled: true
  confirmation_timeout_s: 60

vram:
  monitoring_enabled: true
  warning_threshold_mb: 14000
  critical_threshold_mb: 15000
  poll_interval_s: 10
  total_budget_mb: 16000

ui:
  theme: "dark"
  global_hotkey: "Ctrl+Shift+O"
  language: "it"

# ──────────────────────────────────────────────────
# Phase 7 — Plugin Configurations
# ──────────────────────────────────────────────────

web_search:
  max_results: 5
  cache_ttl_s: 300
  request_timeout_s: 10
  rate_limit_s: 2.0
  region: "it-it"
  proxy_http: null
  proxy_https: null

calendar:
  timezone: "Europe/Rome"
  reminder_check_interval_s: 60

weather:
  default_city: "Rome"
  units: "metric"
  lang: "it"
  cache_ttl_s: 600
  request_timeout_s: 8

clipboard:
  max_content_chars: 4000

notifications:
  app_id: "OMNIA"
  sound_enabled: true
  default_timeout_s: 5
  max_active_timers: 20

media_control:
  volume_step: 10
  brightness_step: 10

file_search:
  allowed_paths: []
  forbidden_paths:
    - "C:\\Windows"
    - "C:\\Program Files"
    - "C:\\Program Files (x86)"
    - "C:\\ProgramData"
  max_results: 50
  max_file_size_read_bytes: 1048576
  max_content_chars: 8000
  follow_symlinks: false

news:
  feeds:
    - "https://feeds.bbci.co.uk/news/world/rss.xml"
    - "https://www.ansa.it/sito/notizie/tecnologia/rss.xml"
    - "https://www.repubblica.it/rss/homepage/rss2.0.xml"
  max_articles: 10
  cache_ttl_minutes: 15
  request_timeout_s: 10
  default_lang: "it"
